services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: concierge
      POSTGRES_PASSWORD: concierge
      POSTGRES_DB: concierge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  litellm-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: litellm
      POSTGRES_DB: litellm
    volumes:
      - litellm-pgdata:/var/lib/postgresql/data

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4001:4000"
    environment:
      LITELLM_MASTER_KEY: sk-litellm-master
      LITELLM_DATABASE_URL: postgresql://litellm:litellm@litellm-db:5432/litellm
      OPENCODE_ZEN_API_KEY: ${OPENCODE_ZEN_API_KEY}
    volumes:
      - ./rag-api/litellm_config.yaml:/app/config.yaml
    command:
      - "--config"
      - "/app/config.yaml"
      - "--port"
      - "4000"
    depends_on:
      - litellm-db

  rag-api:
    build: ./rag-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://concierge:concierge@db:5432/concierge
      LITELLM_API_URL: http://litellm:4000
      LITELLM_MASTER_KEY: sk-litellm-master
      PINECONE_API_KEY: ${PINECONE_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_ADMIN_EMAILS: ${GOOGLE_ADMIN_EMAILS}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-random-secret}
      FRONTEND_URL: http://localhost:8080
    depends_on:
      - db
      - litellm
    volumes:
      - ./rag-api:/app

  telegram-bot-a:
    build: ./telegram
    environment:
      BOT_TOKEN: ${BOT_TOKEN_A}
      RAG_API_URL: http://rag-api:8000
    depends_on:
      - rag-api

  telegram-bot-b:
    build: ./telegram
    environment:
      BOT_TOKEN: ${BOT_TOKEN_B}
      RAG_API_URL: http://rag-api:8000
    depends_on:
      - rag-api

  dashboard:
    build: ./tenantai-hub
    ports:
      - "8080:8080"
    environment:
      VITE_API_URL: http://rag-api:8000
      VITE_API_KEY: ${BOT_TOKEN_A}
      HOST: 0.0.0.0
      PORT: 8080
    volumes:
      - ./tenantai-hub:/app
      - /app/node_modules
    depends_on:
      - rag-api

volumes:
  pgdata:
  litellm-pgdata:
